<!DOCTYPE html>
<html>
<head>
    <title>Write Post</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
body {
    margin: 0;
    height: 100vh;
    background: url('assets/leafy_background.jpg') no-repeat center center/cover;
    font-family: 'Segoe UI', sans-serif;
}

/* dark overlay */
.overlay {
    background: rgba(0, 0, 0, 0.6);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* form card */
.form-card {
    width: 500px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.9);
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

/* inputs */
.form-control {
    border-radius: 10px;
}

/* button */
.btn-success {
    border-radius: 20px;
    width: 100%;
}
</style>

</head>
<body onload="checkUser(); checkAuthor();">

<div class="overlay">
    <div class="card form-card p-4">

        <h2 class="text-center mb-3">Write Post</h2>

        <input type="text" id="title" class="form-control mb-3" placeholder="Enter Title">

        <textarea id="content" class="form-control mb-3" rows="8" placeholder="Write your post..." style="resize: vertical;"></textarea>

        <button onclick="createPost()" class="btn btn-success">Publish</button>

    </div>
</div>

<script src="js/main.js"></script>
<script src="js/post.js"></script>

</body>
</html>
