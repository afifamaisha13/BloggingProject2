<!DOCTYPE html>
<html>
<head>
    <title>Campus Chronicles - Posts</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        

        body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;

    background: url('assets/dark.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* overlay for readability */
.overlay {
    background: rgba(0, 0, 0, 0.6);
    min-height: 100vh;
    padding-bottom: 40px;
}

/* glass card effect */
.post-card {
    background: rgba(255, 255, 255, 0.95);
}

/* transparent navbar */
.navbar {
    background: transparent !important;
}

/* white text for title */
.page-title {
    color: white;
}

        /* Navbar */
        

        .navbar-brand {
            font-weight: bold;
            color: #fff;
        }

        /* Card Styling */
        

        .post-card:hover {
            transform: translateY(-5px);
        }

        /* Buttons */
        .btn-like {
            border-radius: 20px;
        }

        .btn-delete {
            border-radius: 20px;
        }

        /* Comment box */
        .comment-box {
            border-radius: 20px;
        }

        .comment {
            background: #f1f3f6;
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 5px;
        }

        .post-meta {
            font-size: 14px;
            color: gray;
        }

        .fb-btn {
    border-radius: 10px;
    transition: 0.2s;
}

.fb-btn:hover {
    background: #e4e6eb;
}

/* Comments */
.comment {
    display: flex;
    margin-bottom: 8px;
}

.comment-avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #1877f2;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    margin-right: 8px;
}

.comment-content {
    background: #f0f2f5;
    padding: 8px 12px;
    border-radius: 15px;
    max-width: 80%;
}

    </style>
</head>

<body onload="checkUser(); loadNavbar(); loadPosts();">

<!-- NAVBAR -->
<nav class="navbar px-4 py-3">
    <span class="navbar-brand">Campus Chronicles</span>
    <div id="navButtons"></div>
</nav>

<!-- POSTS -->
<div class="overlay">

    <div class="container mt-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold page-title">Explore Posts</h3>
        </div>

        <div id="posts"></div>

    </div>

</div>

<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/post.js"></script>

</body>
</html>
