<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            margin-top: 50px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
                    max-width: 600px; /* Set a maximum width for the card */
            margin-left: auto; /* Center the card horizontally */
            margin-right: auto; /* Center the card horizontally */
        }
    </style>

    <div class="card">
        <h2 class="text-center">Login</h2>
        <input type="text" id="email" class="form-control mb-2" placeholder="Email">
        <input type="password" id="password" class="form-control mb-2" placeholder="Password">
        <button onclick="login()" class="btn btn-primary w-100">Login</button>
    </div>
</div>


<script src="js/auth.js"></script>
</body>
</html>
